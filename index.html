<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дашборд Продуктивности</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <h1>Workspace</h1>
        </div>
        <div class="controls">
            <button id="btn-TodoWidget" class="btn" data-widget="TodoWidget">Задачи</button>
            <button id="btn-QuoteWidget" class="btn" data-widget="QuoteWidget">Цитата</button>
            <button id="btn-WeatherWidget" class="btn" data-widget="WeatherWidget">Погода</button>
            <button id="btn-ClockWidget" class="btn" data-widget="ClockWidget">Часы</button>
            <button id="btn-PomodoroWidget" class="btn" data-widget="PomodoroWidget">Таймер</button>
            <button id="btn-NoteWidget" class="btn" data-widget="NoteWidget">Заметка</button>
        </div>
    </header>

    <main id="dashboard" class="dashboard-grid"></main>

    <script src="app.js"></script>
</body>
</html>
